<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Juego de Reciclaje</title>
<style>
body {
    margin: 0;
    overflow: hidden;
    background: #87CEEB;
    font-family: Arial, sans-serif;
}

#game {
    position: relative;
    width: 100vw;
    height: 100vh;
}

.falling {
    position: absolute;
    font-size: 30px;
}

#bin {
    position: absolute;
    bottom: 20px;
    left: 50%;
    transform: translateX(-50%);
    width: 120px;
    height: auto;
}

#score {
    position: absolute;
    top: 10px;
    left: 10px;
    font-size: 20px;
}

#containerType {
    position: absolute;
    top: 10px;
    right: 10px;
    font-size: 20px;
}
</style>
</head>
<body>

<div id="game">
    <div id="score">Puntos: 0</div>
    <div id="containerType">Contenedor: reciclaje</div>
    <img id="bin" src="./reciclaje.png" alt="bote">
</div>

<script>
const game = document.getElementById("game");
const bin = document.getElementById("bin");
const scoreDisplay = document.getElementById("score");
const containerDisplay = document.getElementById("containerType");

let score = 0;
let currentContainer = "reciclaje";

const containers = [
    { type: "reciclaje", image: "./reciclaje.png" },
    { type: "organico", image: "./organico.png" },
    { type: "basura", image: "./metal.png" }
];

const items = [
    { type: "reciclaje", emoji: "🧴" },
    { type: "organico", emoji: "🍎" },
    { type: "basura", emoji: "🔋" }
];

document.addEventListener("mousemove", (e) => {
    bin.style.left = e.clientX + "px";
});

function changeContainer() {
    const random = containers[Math.floor(Math.random() * containers.length)];
    currentContainer = random.type;
    bin.src = random.image;
    containerDisplay.textContent = "Contenedor: " + random.type;
}

setInterval(changeContainer, 10000);

function createItem() {
    const randomItem = items[Math.floor(Math.random() * items.length)];
    const element = document.createElement("div");
    element.classList.add("falling");
    element.textContent = randomItem.emoji;
    element.style.left = Math.random() * window.innerWidth + "px";
    element.style.top = "0px";
    game.appendChild(element);

    let fallInterval = setInterval(() => {
        let top = parseInt(element.style.top);
        element.style.top = top + 5 + "px";

        const binRect = bin.getBoundingClientRect();
        const itemRect = element.getBoundingClientRect();

        if (
            itemRect.bottom >= binRect.top &&
            itemRect.left < binRect.right &&
            itemRect.right > binRect.left
        ) {
            if (randomItem.type === currentContainer) {
                score += 10;
            } else {
                score -= 5;
            }
            scoreDisplay.textContent = "Puntos: " + score;
            element.remove();
            clearInterval(fallInterval);
        }

        if (top > window.innerHeight) {
            element.remove();
            clearInterval(fallInterval);
        }
    }, 20);
}

setInterval(createItem, 1000);
</script>

</body>
</html>
