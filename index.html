<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>HugoAramburo</title>

<style>

body{
margin:0;
overflow:hidden;
background:#87CEEB;
font-family:Arial;
}

/* GAME */

#game{
position:relative;
width:100vw;
height:100vh;
}

/* LOBBY */

#lobby{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
background:#9ED84E;
z-index:999;
}

/* LOGO LOBBY */

#logoLobby{
position:absolute;
top:15px;
right:15px;
width:200px;
opacity:0.55;
}

/* IMAGENES LOBBY */

.lobbyImg{
position:absolute;
}

/* RECICLAJE */

#reciclaje{
top:80px;
left:90px;
width:150px;
}

#botella{
top:50px;
left:270px;
width:65px;
}

#caja{
top:140px;
left:270px;
width:75px;
}

/* ORGANICO */

#organico{
top:260px;
left:90px;
width:150px;
}

#manzana{
top:270px;
left:270px;
width:60px;
}

#platano{
top:350px;
left:270px;
width:95px;
}

/* BASURA */

#basura{
top:460px;
left:90px;
width:150px;
}

#sabritas{
top:470px;
left:270px;
width:85px;
}

#papel{
top:540px;
left:270px;
width:65px;
}

/* BOTON JUGAR */

#playBtn{
position:absolute;
bottom:120px;
right:160px;
font-size:50px;
padding:25px 70px;
border:8px solid black;
border-radius:20px;
background:#9ED84E;
cursor:pointer;
}

/* OBJETOS JUEGO */

.falling{
position:absolute;
}

.falling img{
width:45px;
height:45px;
pointer-events:none;
}

.manzana{
width:26px!important;
height:26px!important;
}

.grande{
width:65px!important;
height:65px!important;
}

.muy-grande{
width:70px!important;
height:70px!important;
}

/* BOTE */

#bin{
position:absolute;
bottom:20px;
width:170px;
height:170px;
}

#bin img{
width:170px;
}

/* UI */

#score{
position:absolute;
top:10px;
left:10px;
font-size:20px;
}

#containerType{
position:absolute;
top:10px;
right:10px;
font-size:20px;
}

#timer{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
font-size:22px;
background:rgba(255,255,255,0.8);
padding:6px 12px;
border-radius:8px;
}

/* LOGO */

#logo{
position:absolute;
top:30px;
right:5px;
width:200px;
opacity:0.55;
}

</style>
</head>

<body>

<div id="lobby">

<img src="logo2.png" id="logoLobby">

<img src="botereciclaje.png" class="lobbyImg" id="reciclaje">
<img src="botella_plastico.png" class="lobbyImg" id="botella">
<img src="caja_carton.png" class="lobbyImg" id="caja">

<img src="boteorganico.png" class="lobbyImg" id="organico">
<img src="manzana.png" class="lobbyImg" id="manzana">
<img src="platano.png" class="lobbyImg" id="platano">

<img src="botebasura.png" class="lobbyImg" id="basura">
<img src="envoltura_sabritas.png" class="lobbyImg" id="sabritas">
<img src="papel_usado.png" class="lobbyImg" id="papel">

<button id="playBtn">Jugar</button>

</div>

<div id="game">

<img src="logo2.png" id="logo">

<div id="score">Puntos: 0</div>
<div id="containerType">Contenedor:</div>
<div id="timer">Tiempo: 3:00</div>
<div id="bin"></div>

</div>

<script>

const lobby=document.getElementById("lobby")
const playBtn=document.getElementById("playBtn")

let gameStarted=false
let gameOver=false

playBtn.onclick=()=>{
lobby.style.display="none"
musica.play()
gameStarted=true
startGameTimer()
}

/* VARIABLES */

const game=document.getElementById("game")
const bin=document.getElementById("bin")
const scoreDisplay=document.getElementById("score")
const containerDisplay=document.getElementById("containerType")
const timerDisplay=document.getElementById("timer")

let binX=window.innerWidth/2-85
bin.style.left=binX+"px"

let moveLeft=false
let moveRight=false
const speed=7

let score=0
let currentContainer=""
let timeLeft=5

/* TEMPORIZADOR 3 MIN */

let gameTime=180

function startGameTimer(){

const timer=setInterval(()=>{

if(gameOver){
clearInterval(timer)
return
}

gameTime--

let minutes=Math.floor(gameTime/60)
let seconds=gameTime%60

if(seconds<10) seconds="0"+seconds

timerDisplay.textContent="Tiempo: "+minutes+":"+seconds

if(gameTime<=0){

gameOver=true
timerDisplay.textContent="¡El juego ha terminado!"
musica.pause()

}

},1000)

}

/* SONIDOS */

const sonidoCorrecto=new Audio("correcto.mp3")
const sonidoIncorrecto=new Audio("incorrecto.mp3")
const musica=new Audio("musica.mp3")

musica.loop=true
musica.volume=0.25

/* CONTROLES */

document.addEventListener("keydown",e=>{
if(e.key==="a"||e.key==="ArrowLeft") moveLeft=true
if(e.key==="d"||e.key==="ArrowRight") moveRight=true
})

document.addEventListener("keyup",e=>{
if(e.key==="a"||e.key==="ArrowLeft") moveLeft=false
if(e.key==="d"||e.key==="ArrowRight") moveRight=false
})

setInterval(()=>{

if(gameOver) return

if(moveLeft) binX-=speed
if(moveRight) binX+=speed

binX=Math.max(0,Math.min(window.innerWidth-bin.offsetWidth,binX))
bin.style.left=binX+"px"

},16)

/* CONTENEDORES */

const containers=[
{type:"reciclaje",img:"botereciclaje.png",name:"Reciclaje"},
{type:"organico",img:"boteorganico.png",name:"Orgánico"},
{type:"basura",img:"botebasura.png",name:"Basura general"}
]

/* OBJETOS */

const items=[
{type:"reciclaje",img:"botella_plastico.png"},
{type:"reciclaje",img:"caja_carton.png"},
{type:"organico",img:"manzana.png",class:"manzana"},
{type:"organico",img:"platano.png",class:"grande"},
{type:"basura",img:"papel_usado.png"},
{type:"basura",img:"envoltura_sabritas.png",class:"muy-grande"}
]

function changeContainer(){

const r=containers[Math.floor(Math.random()*containers.length)]

currentContainer=r.type
bin.innerHTML=`<img src="${r.img}">`
containerDisplay.textContent="Contenedor: "+r.name

}

setInterval(()=>{

if(gameOver) return

timeLeft--

if(timeLeft<0){
changeContainer()
timeLeft=5
}

},1000)

changeContainer()

function createItem(){

if(gameOver) return

const r=items[Math.floor(Math.random()*items.length)]

const el=document.createElement("div")
el.className="falling"
el.style.left=Math.random()*(window.innerWidth-85)+"px"
el.style.top="0px"

const img=document.createElement("img")
img.src=r.img

if(r.class) img.classList.add(r.class)

el.appendChild(img)
game.appendChild(el)

const fall=setInterval(()=>{

if(gameOver){
el.remove()
clearInterval(fall)
return
}

el.style.top=(parseInt(el.style.top)+5)+"px"

const b=bin.getBoundingClientRect()
const i=el.getBoundingClientRect()

if(
i.bottom>=b.top &&
i.left+i.width/2>=b.left &&
i.right-i.width/2<=b.right
){

if(r.type===currentContainer){

score+=10
sonidoCorrecto.currentTime=0
sonidoCorrecto.play()

}else{

score-=5
sonidoIncorrecto.currentTime=0
sonidoIncorrecto.play()

}

scoreDisplay.textContent="Puntos: "+score

el.remove()
clearInterval(fall)

}

if(parseInt(el.style.top)>window.innerHeight){

el.remove()
clearInterval(fall)

}

},20)

}

setInterval(createItem,1000)

</script>

</body>
</html>
