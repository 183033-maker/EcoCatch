<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Juego de Reciclaje</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: #87CEEB;
    font-family: Arial, sans-serif;
}

#game {
    position: relative;
    width: 100vw;
    height: 100vh;
}

.falling {
    position: absolute;
    font-size: 30px;
    user-select: none;
}

#bin {
    position: absolute;
    bottom: 20px;
    font-size: 60px;
}

#score {
    position: absolute;
    top: 10px;
    left: 10px;
    font-size: 20px;
}

#containerType {
    position: absolute;
    top: 10px;
    right: 10px;
    font-size: 20px;
}
</style>
</head>

<body>

<div id="game">
    <div id="score">Puntos: 0</div>
    <div id="containerType">Contenedor: Reciclaje ♻️</div>
    <div id="bin">♻️</div>
</div>

<script>
const game = document.getElementById("game");
const bin = document.getElementById("bin");
const scoreDisplay = document.getElementById("score");
const containerDisplay = document.getElementById("containerType");

let score = 0;
let currentContainer = "reciclaje";

// Tipos de contenedores
const containers = [
    { type: "reciclaje", emoji: "♻️", name: "Reciclaje" },
    { type: "organico", emoji: "🟤", name: "Orgánico" },
    { type: "basura", emoji: "🗑️", name: "Basura" }
];

// Objetos que caen
const items = [
    { type: "reciclaje", emoji: "🧴" },
    { type: "organico", emoji: "🍎" },
    { type: "basura", emoji: "🔋" }
];

// Movimiento del contenedor
document.addEventListener("mousemove", (e) => {
    let x = e.clientX - bin.offsetWidth / 2;

    // Límites
    x = Math.max(0, Math.min(window.innerWidth - bin.offsetWidth, x));
    bin.style.left = x + "px";
});

// Cambiar tipo de contenedor
function changeContainer() {
    const random = containers[Math.floor(Math.random() * containers.length)];
    currentContainer = random.type;
    bin.textContent = random.emoji;
    containerDisplay.textContent = `Contenedor: ${random.name} ${random.emoji}`;
}

setInterval(changeContainer, 10000);

// Crear objetos que caen
function createItem() {
    const randomItem = items[Math.floor(Math.random() * items.length)];
    const element = document.createElement("div");

    element.className = "falling";
    element.textContent = randomItem.emoji;
    element.style.left = Math.random() * (window.innerWidth - 30) + "px";
    element.style.top = "0px";

    game.appendChild(element);

    const fallInterval = setInterval(() => {
        let top = parseInt(element.style.top);
        element.style.top = top + 5 + "px";

        const binRect = bin.getBoundingClientRect();
        const itemRect = element.getBoundingClientRect();

        // Colisión
        if (
            itemRect.bottom >= binRect.top &&
            itemRect.left + itemRect.width / 2 >= binRect.left &&
            itemRect.right - itemRect.width / 2 <= binRect.right
        ) {
            score += (randomItem.type === currentContainer) ? 10 : -5;
            scoreDisplay.textContent = "Puntos: " + score;

            element.remove();
            clearInterval(fallInterval);
        }

        // Sale de pantalla
        if (top > window.innerHeight) {
            element.remove();
            clearInterval(fallInterval);
        }
    }, 20);
}

setInterval(createItem, 1000);
</script>

</body>
</html>
