<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>EcoCatch</title>

<style>
body{
margin:0;
overflow:hidden;
background:#87CEEB;
font-family:Arial;
}

#game{
position:relative;
width:100vw;
height:100vh;
}

.objeto{
position:absolute;
width:80px;
}

.bote{
position:absolute;
bottom:20px;
width:120px;
}

#basura{left:15%;}
#organico{left:45%;}
#reciclaje{left:75%;}

#puntaje{
position:absolute;
top:10px;
left:10px;
font-size:24px;
background:white;
padding:10px;
border-radius:10px;
}
</style>
</head>

<body>

<div id="game">

<div id="puntaje">Puntos: 0</div>

<img id="basura" class="bote" src="botebasura.png">
<img id="organico" class="bote" src="boteorganico.png">
<img id="reciclaje" class="bote" src="botereciclaje.png">

</div>

<script>

let puntos = 0

// SONIDOS
const sonidoCorrecto = new Audio("correcto.mp3")
const sonidoIncorrecto = new Audio("incorrecto.mp3")
const musica = new Audio("musica.mp3")

sonidoCorrecto.volume = 1
sonidoIncorrecto.volume = 1
musica.volume = 0.4
musica.loop = true


// iniciar música al primer click
document.addEventListener("click", () => {
musica.play()
},{once:true})


function crearObjeto(){

const objetos = [
{img:"botella_plastico.png", tipo:"reciclaje"},
{img:"caja_carton.png", tipo:"reciclaje"},
{img:"papel_usado.png", tipo:"reciclaje"},
{img:"envoltura_sabritas.png", tipo:"basura"},
{img:"manzana.png", tipo:"organico"},
{img:"platano.png", tipo:"organico"}
]

let obj = objetos[Math.floor(Math.random()*objetos.length)]

let elemento = document.createElement("img")
elemento.src = obj.img
elemento.classList.add("objeto")

elemento.style.left = Math.random()*90+"vw"
elemento.style.top = "-100px"

document.getElementById("game").appendChild(elemento)

let y = -100

let caer = setInterval(()=>{

y+=5
elemento.style.top = y+"px"

if(y>window.innerHeight-150){

let boteCorrecto = document.getElementById(obj.tipo)

let rect1 = elemento.getBoundingClientRect()
let rect2 = boteCorrecto.getBoundingClientRect()

if(
rect1.left < rect2.right &&
rect1.right > rect2.left &&
rect1.bottom > rect2.top
){

puntos++
document.getElementById("puntaje").innerText = "Puntos: "+puntos

sonidoCorrecto.currentTime = 0
sonidoCorrecto.play()

}else{

sonidoIncorrecto.currentTime = 0
sonidoIncorrecto.play()

}

clearInterval(caer)
elemento.remove()

}

},30)

}

setInterval(crearObjeto,1500)

</script>

</body>
</html>
