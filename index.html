<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>EcoCatch</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: #87CEEB;
    font-family: Arial, sans-serif;
}

#game {
    position: relative;
    width: 100vw;
    height: 100vh;
}

.falling {
    position: absolute;
}

.falling img {
    width: 45px;
    height: 45px;
    pointer-events: none;
}

.manzana {
    width: 26px !important;
    height: 26px !important;
}

.grande {
    width: 65px !important;
    height: 65px !important;
}

.muy-grande {
    width: 70px !important;
    height: 70px !important;
}

#bin {
    position: absolute;
    bottom: 20px;
    width: 170px;
    height: 170px;
}

#bin img {
    width: 170px;
    height: 170px;
}

#score {
    position: absolute;
    top: 10px;
    left: 10px;
    font-size: 20px;
}

#containerType {
    position: absolute;
    top: 10px;
    right: 10px;
    font-size: 20px;
}

#timer {
    position: absolute;
    bottom: 10px;
    right: 10px;
    font-size: 18px;
    background: rgba(255,255,255,0.8);
    padding: 6px 10px;
    border-radius: 8px;
}
</style>
</head>

<body>

<div id="game">
    <div id="score">Puntos: 0</div>
    <div id="containerType">Contenedor:</div>
    <div id="timer">Cambio de bote en: 5</div>
    <div id="bin"></div>
</div>

<script>

const game = document.getElementById("game");
const bin = document.getElementById("bin");
const scoreDisplay = document.getElementById("score");
const containerDisplay = document.getElementById("containerType");
const timerDisplay = document.getElementById("timer");

/* posición inicial */
let binX = window.innerWidth / 2 - 85;
bin.style.left = binX + "px";

let moveLeft = false;
let moveRight = false;
const speed = 7;

let score = 0;
let currentContainer = "";
let timeLeft = 5;

/* SONIDOS */
const sonidoCorrecto = new Audio("correcto.mp3");
const sonidoIncorrecto = new Audio("incorrecto.mp3");
const musica = new Audio("musica.mp3");

musica.loop = true;
musica.volume = 0.25;

window.addEventListener("click", () => {
    musica.play();
});

/* CONTROLES */

document.addEventListener("keydown", e => {

    if (e.key === "a" || e.key === "ArrowLeft") {
        moveLeft = true;
    }

    if (e.key === "d" || e.key === "ArrowRight") {
        moveRight = true;
    }

});

document.addEventListener("keyup", e => {

    if (e.key === "a" || e.key === "ArrowLeft") {
        moveLeft = false;
    }

    if (e.key === "d" || e.key === "ArrowRight") {
        moveRight = false;
    }

});

/* movimiento continuo */

setInterval(() => {

    if (moveLeft) {
        binX -= speed;
    }

    if (moveRight) {
        binX += speed;
    }

    binX = Math.max(0, Math.min(window.innerWidth - bin.offsetWidth, binX));
    bin.style.left = binX + "px";

}, 16);


/* CONTENEDORES */
const containers = [
    { type: "reciclaje", img: "botereciclaje.png", name: "Reciclaje" },
    { type: "organico", img: "boteorganico.png", name: "Orgánico" },
    { type: "basura", img: "botebasura.png", name: "Basura general" }
];

/* OBJETOS */
const items = [
    { type: "reciclaje", img: "botella_plastico.png" },
    { type: "reciclaje", img: "caja_carton.png" },

    { type: "organico", img: "manzana.png", class: "manzana" },
    { type: "organico", img: "platano.png", class: "grande" },

    { type: "basura", img: "papel_usado.png" },
    { type: "basura", img: "envoltura_sabritas.png", class: "muy-grande" }
];

/* cambiar contenedor */

function changeContainer() {
    const r = containers[Math.floor(Math.random() * containers.length)];
    currentContainer = r.type;
    bin.innerHTML = `<img src="${r.img}" alt="${r.name}">`;
    containerDisplay.textContent = `Contenedor: ${r.name}`;
}

/* contador */

setInterval(() => {

    timerDisplay.textContent = `Cambio de bote en: ${timeLeft}`;
    timeLeft--;

    if (timeLeft < 0) {
        changeContainer();
        timeLeft = 5;
    }

}, 1000);

changeContainer();

/* crear objetos */

function createItem() {

    const r = items[Math.floor(Math.random() * items.length)];

    const el = document.createElement("div");
    el.className = "falling";
    el.style.left = Math.random() * (window.innerWidth - 85) + "px";
    el.style.top = "0px";

    const img = document.createElement("img");
    img.src = r.img;

    if (r.class) img.classList.add(r.class);

    el.appendChild(img);
    game.appendChild(el);

    const fall = setInterval(() => {

        el.style.top = (parseInt(el.style.top) + 5) + "px";

        const b = bin.getBoundingClientRect();
        const i = el.getBoundingClientRect();

        if (
            i.bottom >= b.top &&
            i.left + i.width / 2 >= b.left &&
            i.right - i.width / 2 <= b.right
        ) {

            if (r.type === currentContainer) {

                score += 10;
                sonidoCorrecto.pause();
                sonidoCorrecto.currentTime = 0;
                sonidoCorrecto.play();

            } else {

                score -= 5;
                sonidoIncorrecto.pause();
                sonidoIncorrecto.currentTime = 0;
                sonidoIncorrecto.play();

            }

            scoreDisplay.textContent = "Puntos: " + score;

            el.remove();
            clearInterval(fall);
        }

        if (parseInt(el.style.top) > window.innerHeight) {
            el.remove();
            clearInterval(fall);
        }

    }, 20);
}

setInterval(createItem, 1000);

</script>

</body>
</html>
