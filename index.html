<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Juego de Reciclaje</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: #87CEEB;
    font-family: Arial, sans-serif;
}

#game {
    position: relative;
    width: 100vw;
    height: 100vh;
}

/* OBJETOS QUE CAEN */
.falling {
    position: absolute;
    user-select: none;
}

.falling img {
    width: 45px;
    height: 45px;
    pointer-events: none;
}

/* Manzana un poco más pequeña */
.manzana {
    width: 38px !important;
    height: 38px !important;
}

/* CONTENEDOR */
#bin {
    position: absolute;
    bottom: 20px; /* misma altura */
    width: 110px;
    height: 110px;
}

#bin img {
    width: 110px;
    height: 110px;
    pointer-events: none;
}

/* UI */
#score {
    position: absolute;
    top: 10px;
    left: 10px;
    font-size: 20px;
}

#containerType {
    position: absolute;
    top: 10px;
    right: 10px;
    font-size: 20px;
}
</style>
</head>

<body>

<div id="game">
    <div id="score">Puntos: 0</div>
    <div id="containerType">Contenedor: Reciclaje</div>

    <div id="bin">
        <img src="botereciclaje.png" alt="Contenedor">
    </div>
</div>

<script>
const game = document.getElementById("game");
const bin = document.getElementById("bin");
const scoreDisplay = document.getElementById("score");
const containerDisplay = document.getElementById("containerType");

let score = 0;
let currentContainer = "reciclaje";

// CONTENEDORES
const containers = [
    { type: "reciclaje", img: "botereciclaje.png", name: "Reciclaje" },
    { type: "organico", img: "boteorganico.png", name: "Orgánico" },
    { type: "basura", img: "botebasura.png", name: "Basura general" }
];

// OBJETOS QUE CAEN
const items = [
    { type: "reciclaje", img: "botella_plastico.png" },
    { type: "reciclaje", img: "caja_carton.png" },
    { type: "organico", img: "manzana.png", class: "manzana" },
    { type: "organico", img: "platano.png" },
    { type: "basura", img: "papel_usado.png" },
    { type: "basura", img: "envoltura_sabritas.png" }
];

// MOVER CONTENEDOR
document.addEventListener("mousemove", (e) => {
    let x = e.clientX - bin.offsetWidth / 2;
    x = Math.max(0, Math.min(window.innerWidth - bin.offsetWidth, x));
    bin.style.left = x + "px";
});

// CAMBIAR CONTENEDOR
function changeContainer() {
    const random = containers[Math.floor(Math.random() * containers.length)];
    currentContainer = random.type;
    bin.innerHTML = `<img src="${random.img}" alt="${random.name}">`;
    containerDisplay.textContent = `Contenedor: ${random.name}`;
}
setInterval(changeContainer, 10000);

// CREAR OBJETOS
function createItem() {
    const randomItem = items[Math.floor(Math.random() * items.length)];

    const element = document.createElement("div");
    element.className = "falling";
    element.style.left = Math.random() * (window.innerWidth - 45) + "px";
    element.style.top = "0px";

    const img = document.createElement("img");
    img.src = randomItem.img;

    if (randomItem.class) {
        img.classList.add(randomItem.class);
    }

    element.appendChild(img);
    game.appendChild(element);

    const fallInterval = setInterval(() => {
        let top = parseInt(element.style.top);
        element.style.top = top + 5 + "px";

        const binRect = bin.getBoundingClientRect();
        const itemRect = element.getBoundingClientRect();

        if (
            itemRect.bottom >= binRect.top &&
            itemRect.left + itemRect.width / 2 >= binRect.left &&
            itemRect.right - itemRect.width / 2 <= binRect.right
        ) {
            score += (randomItem.type === currentContainer) ? 10 : -5;
            scoreDisplay.textContent = "Puntos: " + score;
            element.remove();
            clearInterval(fallInterval);
        }

        if (top > window.innerHeight) {
            element.remove();
            clearInterval(fallInterval);
        }
    }, 20);
}

setInterval(createItem, 1000);
</script>

</body>
</html>
