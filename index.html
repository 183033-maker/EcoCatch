<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Juego de Reciclaje</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    background: #87CEEB;
    font-family: Arial, sans-serif;
}

#game {
    position: relative;
    width: 100vw;
    height: 100vh;
}

/* OBJETOS */
.falling {
    position: absolute;
    user-select: none;
}

.falling img {
    width: 45px;
    height: 45px;
    pointer-events: none;
}

/* tamaños especiales */
.manzana {
    width: 22px !important;
    height: 22px !important;
}

.grande {
    width: 65px !important;
    height: 65px !important;
}

/* CONTENEDORES (todos iguales) */
#bin {
    position: absolute;
    bottom: 20px;
    width: 170px;
    height: 170px;
}

#bin img {
    width: 170px;
    height: 170px;
    pointer-events: none;
}

/* UI */
#score {
    position: absolute;
    top: 10px;
    left: 10px;
    font-size: 20px;
}

#containerType {
    position: absolute;
    top: 10px;
    right: 10px;
    font-size: 20px;
}
</style>
</head>

<body>

<div id="game">
    <div id="score">Puntos: 0</div>
    <div id="containerType">Contenedor: Reciclaje</div>

    <div id="bin">
        <img src="botereciclaje.png" alt="Contenedor">
    </div>
</div>

<script>
const game = document.getElementById("game");
const bin = document.getElementById("bin");
const scoreDisplay = document.getElementById("score");
const containerDisplay = document.getElementById("containerType");

let score = 0;
let currentContainer = "reciclaje";

/* CONTENEDORES */
const containers = [
    { type: "reciclaje", img: "botereciclaje.png", name: "Reciclaje" },
    { type: "organico", img: "boteorganico.png", name: "Orgánico" },
    { type: "basura", img: "botebasura.png", name: "Basura general" }
];

/* OBJETOS */
const items = [
    { type: "reciclaje", img: "botella_plastico.png" },
    { type: "reciclaje", img: "caja_carton.png" },

    { type: "organico", img: "manzana.png", class: "manzana" },
    { type: "organico", img: "platano.png", class: "grande" },

    { type: "basura", img: "papel_usado.png" },
    { type: "basura", img: "envoltura_sabritas.png", class: "grande" }
];

/* mover contenedor */
document.addEventListener("mousemove", e => {
    let x = e.clientX - bin.offsetWidth / 2;
    x = Math.max(0, Math.min(window.innerWidth - bin.offsetWidth, x));
    bin.style.left = x + "px";
});

/* cambiar contenedor */
function changeContainer() {
    const r = containers[Math.floor(Math.random() * containers.length)];
    currentContainer = r.type;
    bin.innerHTML = `<img src="${r.img}" alt="${r.name}">`;
    containerDisplay.textContent = `Contenedor: ${r.name}`;
}
setInterval(changeContainer, 10000);

/* crear objetos */
function createItem() {
    const r = items[Math.floor(Math.random() * items.length)];

    const el = document.createElement("div");
    el.className = "falling";
    el.style.left = Math.random() * (window.innerWidth - 65) + "px";
    el.style.top = "0px";

    const img = document.createElement("img");
    img.src = r.img;
    if (r.class) img.classList.add(r.class);

    el.appendChild(img);
    game.appendChild(el);

    const fall = setInterval(() => {
        el.style.top = (parseInt(el.style.top) + 5) + "px";

        const b = bin.getBoundingClientRect();
        const i = el.getBoundingClientRect();

        if (
            i.bottom >= b.top &&
            i.left + i.width / 2 >= b.left &&
            i.right - i.width / 2 <= b.right
        ) {
            score += (r.type === currentContainer) ? 10 : -5;
            scoreDisplay.textContent = "Puntos: " + score;
            el.remove();
            clearInterval(fall);
        }

        if (parseInt(el.style.top) > window.innerHeight) {
            el.remove();
            clearInterval(fall);
        }
    }, 20);
}

setInterval(createItem, 1000);
</script>

</body>
</html>
