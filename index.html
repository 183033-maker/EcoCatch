<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Guardianes del Planeta</title>

<style>

body{
    margin:0;
    background:#9ED24B;
    font-family:Arial;
}

/* LOGO */
#logo{
    position:absolute;
    top:10px;
    right:10px;
    width:180px;
    opacity:0.6;
}

/* BASUREROS */

.basura{
    position:absolute;
    width:90px;
}

#reciclaje{
    top:120px;
    left:120px;
}

#organico{
    top:320px;
    left:120px;
}

#general{
    top:560px;
    left:120px;
}

/* OBJETOS */

.objeto{
    position:absolute;
    width:60px;
}

/* fila 1 */

#botella{
    top:60px;
    left:260px;
}

#caja{
    top:150px;
    left:260px;
}

/* fila 2 */

#manzana{
    top:330px;
    left:260px;
}

#banana{
    top:420px;
    left:260px;
}

/* fila 3 */

#papas{
    top:610px;
    left:260px;
}

#papel{
    top:690px;
    left:260px;
}

/* BOTON JUGAR */

#jugar{
    position:absolute;
    bottom:80px;
    right:120px;
    font-size:50px;
    padding:25px 90px;
    border:8px solid black;
    border-radius:25px;
    background:#9ED24B;
    cursor:pointer;
}

#jugar:hover{
    background:#8cc63f;
}

</style>
</head>

<body>

<!-- LOGO -->
<img id="logo" src="logo.png">

<!-- BASUREROS -->
<img id="reciclaje" class="basura" src="basura_reciclaje.png">
<img id="organico" class="basura" src="basura_organica.png">
<img id="general" class="basura" src="basura_general.png">

<!-- OBJETOS -->
<img id="botella" class="objeto" src="botella.png">
<img id="caja" class="objeto" src="caja.png">

<img id="manzana" class="objeto" src="manzana.png">
<img id="banana" class="objeto" src="banana.png">

<img id="papas" class="objeto" src="papas.png">
<img id="papel" class="objeto" src="papel.png">

<!-- BOTON -->
<button id="jugar">Jugar</button>

<script>

document.getElementById("jugar").onclick = function(){
    alert("El juego comenzará");
}

</script>

</body>
</html>
