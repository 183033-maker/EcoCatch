<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>hugoaramburo</title>

<style>

body{
margin:0;
overflow:hidden;
background:#87CEEB;
font-family:Arial;
}

/* GAME */

#game{
position:relative;
width:100vw;
height:100vh;
}

/* LOBBY */

#lobby{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
background:#9ED84E;
z-index:999;
}

/* TITULO */

#title{
position:absolute;
top:30px;
left:50%;
transform:translateX(-50%);
font-size:100px;
font-weight:900;
color:white;
letter-spacing:4px;
text-shadow:
4px 4px 0 rgba(0,0,0,0.25),
8px 8px 20px rgba(0,0,0,0.2);
}

/* IMAGENES LOBBY */

.lobbyImg{
position:absolute;
}

/* BOTES A LA MISMA ALTURA */

#reciclaje{
top:220px;
left:120px;
width:150px;
}

#organico{
top:220px;
left:420px;
width:150px;
}

#basura{
top:220px;
left:720px;
width:150px;
}

/* OBJETOS LOBBY */

#botella{
top:200px;
left:300px;
width:65px;
}

#caja{
top:280px;
left:300px;
width:75px;
}

#manzana{
top:200px;
left:600px;
width:40px;
}

#platano{
top:250px;
left:570px;
width:95px;
}

#sabritas{
top:200px;
left:900px;
width:85px;
}

#papel{
top:280px;
left:920px;
width:65px;
}

/* BOTON JUGAR */

#playBtn{
position:absolute;
bottom:120px;
right:160px;
font-size:50px;
padding:25px 70px;
border:8px solid #b38f00;
border-radius:20px;
background:linear-gradient(#FFD84D,#FFC300);
color:black;
font-weight:bold;
cursor:pointer;
transition:0.25s;
box-shadow:0 8px 0 #b38f00;
}

#playBtn:hover{
background:linear-gradient(#FFE97A,#FFD84D);
transform:scale(1.15);
box-shadow:0 10px 0 #b38f00;
}

/* BOTON REINICIO */

#restartBtn{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:40px;
padding:20px 60px;
border:6px solid black;
border-radius:20px;
background:white;
cursor:pointer;
display:none;
}

/* OBJETOS JUEGO */

.falling{
position:absolute;
}

.falling img{
width:45px;
height:45px;
pointer-events:none;
}

.manzana{
width:26px!important;
height:26px!important;
}

.grande{
width:65px!important;
height:65px!important;
}

.muy-grande{
width:70px!important;
height:70px!important;
}

/* BOTE */

#bin{
position:absolute;
bottom:20px;
width:170px;
height:170px;
}

#bin img{
width:170px;
}

/* UI */

#score{
position:absolute;
top:10px;
left:10px;
font-size:20px;
}

#containerType{
position:absolute;
top:10px;
right:10px;
font-size:20px;
}

#timer{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
font-size:22px;
background:rgba(255,255,255,0.8);
padding:6px 12px;
border-radius:8px;
}

/* EFECTOS VISUALES */

.particle{
position:absolute;
width:8px;
height:8px;
border-radius:50%;
pointer-events:none;
animation:explode 0.6s forwards;
}

.correct{
background:#00ff6a;
}

.wrong{
background:#ff3b3b;
}

@keyframes explode{
0%{transform:translate(0,0) scale(1);opacity:1;}
100%{transform:translate(var(--x),var(--y)) scale(0.2);opacity:0;}
}

.catchEffect{
animation:flash 0.25s;
}

@keyframes flash{
0%{transform:scale(1)}
50%{transform:scale(1.4)}
100%{transform:scale(1)}
}

.blink{
animation:blink 0.4s infinite;
}

@keyframes blink{
0%{opacity:1}
50%{opacity:0.3}
100%{opacity:1}
}

</style>
</head>

<body>

<div id="lobby">

<h1 id="title">EcoCatch</h1>

<img src="botereciclaje.png" class="lobbyImg" id="reciclaje">
<img src="botella_plastico.png" class="lobbyImg" id="botella">
<img src="caja_carton.png" class="lobbyImg" id="caja">

<img src="boteorganico.png" class="lobbyImg" id="organico">
<img src="manzana.png" class="lobbyImg" id="manzana">
<img src="platano.png" class="lobbyImg" id="platano">

<img src="botebasura.png" class="lobbyImg" id="basura">
<img src="envoltura_sabritas.png" class="lobbyImg" id="sabritas">
<img src="papel_usado.png" class="lobbyImg" id="papel">

<button id="playBtn">Jugar ahora</button>

</div>

<div id="game">

<div id="score">Puntos: 0</div>
<div id="containerType">Contenedor:</div>
<div id="timer">Tiempo: 2:00</div>

<div id="bin"></div>

<button id="restartBtn">Jugar de nuevo</button>

</div>

<script>

const lobby=document.getElementById("lobby")
const playBtn=document.getElementById("playBtn")
const restartBtn=document.getElementById("restartBtn")

playBtn.onclick=()=>{
lobby.style.display="none"
musica.play()
startGameTimer()
}

restartBtn.onclick=()=>{
location.reload()
}

const game=document.getElementById("game")
const bin=document.getElementById("bin")
const scoreDisplay=document.getElementById("score")
const containerDisplay=document.getElementById("containerType")
const timerDisplay=document.getElementById("timer")

let binX=window.innerWidth/2-85
bin.style.left=binX+"px"

let moveLeft=false
let moveRight=false
const speed=7

let score=0
let currentContainer=""
let timeLeft=5

let gameOver=false

let gameTime=120

function startGameTimer(){

const timer=setInterval(()=>{

if(gameOver){
clearInterval(timer)
return
}

gameTime--

let minutes=Math.floor(gameTime/60)
let seconds=gameTime%60

if(seconds<10) seconds="0"+seconds

timerDisplay.textContent="Tiempo: "+minutes+":"+seconds

if(gameTime<=0){

gameOver=true
timerDisplay.textContent="El juego ha terminado"
musica.pause()

restartBtn.style.display="block"

}

},1000)

}

const sonidoCorrecto=new Audio("correcto.mp3")
const sonidoIncorrecto=new Audio("incorrecto.mp3")
const musica=new Audio("musica.mp3")

musica.loop=true
musica.volume=0.25

document.addEventListener("keydown",e=>{
if(e.key==="a"||e.key==="ArrowLeft") moveLeft=true
if(e.key==="d"||e.key==="ArrowRight") moveRight=true
})

document.addEventListener("keyup",e=>{
if(e.key==="a"||e.key==="ArrowLeft") moveLeft=false
if(e.key==="d"||e.key==="ArrowRight") moveRight=false
})

setInterval(()=>{

if(gameOver) return

if(moveLeft) binX-=speed
if(moveRight) binX+=speed

binX=Math.max(0,Math.min(window.innerWidth-bin.offsetWidth,binX))
bin.style.left=binX+"px"

},16)

/* CONTENEDORES */

const containers=[
{type:"reciclaje",img:"botereciclaje.png",name:"Reciclaje"},
{type:"organico",img:"boteorganico.png",name:"Organico"},
{type:"basura",img:"botebasura.png",name:"Basura general"}
]

/* OBJETOS */

const items=[
{type:"reciclaje",img:"botella_plastico.png"},
{type:"reciclaje",img:"caja_carton.png"},
{type:"organico",img:"manzana.png",class:"manzana"},
{type:"organico",img:"platano.png",class:"grande"},
{type:"basura",img:"papel_usado.png"},
{type:"basura",img:"envoltura_sabritas.png",class:"muy-grande"}
]

function changeContainer(){

const r=containers[Math.floor(Math.random()*containers.length)]

currentContainer=r.type
bin.innerHTML=`<img src="${r.img}">`
containerDisplay.textContent="Contenedor: "+r.name

}

setInterval(()=>{

if(gameOver) return

timeLeft--

if(timeLeft<=2 && timeLeft>0){
bin.classList.add("blink")
}

if(timeLeft<=0){

bin.classList.remove("blink")
changeContainer()
timeLeft=5

}

},1000)

changeContainer()

function spawnParticles(x,y,type){

for(let i=0;i<8;i++){

const p=document.createElement("div")
p.className="particle "+type

const dx=(Math.random()*100-50)+"px"
const dy=(Math.random()*100-50)+"px"

p.style.left=x+"px"
p.style.top=y+"px"

p.style.setProperty("--x",dx)
p.style.setProperty("--y",dy)

game.appendChild(p)

setTimeout(()=>p.remove(),600)

}

}

/* PROBABILIDAD MEJORADA */

function createItem(){

if(gameOver) return

let r

if(Math.random()<0.6){

const filtered=items.filter(i=>i.type===currentContainer)
r=filtered[Math.floor(Math.random()*filtered.length)]

}else{

r=items[Math.floor(Math.random()*items.length)]

}

const el=document.createElement("div")
el.className="falling"
el.style.left=Math.random()*(window.innerWidth-85)+"px"
el.style.top="0px"

const img=document.createElement("img")
img.src=r.img

if(r.class) img.classList.add(r.class)

el.appendChild(img)
game.appendChild(el)

const fall=setInterval(()=>{

if(gameOver){
el.remove()
clearInterval(fall)
return
}

el.style.top=(parseInt(el.style.top)+5)+"px"

const b=bin.getBoundingClientRect()
const i=el.getBoundingClientRect()

if(
i.bottom>=b.top &&
i.left+i.width/2>=b.left &&
i.right-i.width/2<=b.right
){

bin.classList.add("catchEffect")
setTimeout(()=>bin.classList.remove("catchEffect"),200)

if(r.type===currentContainer){

score+=10
sonidoCorrecto.currentTime=0
sonidoCorrecto.play()

spawnParticles(i.left,i.top,"correct")

}else{

score-=5
sonidoIncorrecto.currentTime=0
sonidoIncorrecto.play()

spawnParticles(i.left,i.top,"wrong")

}

scoreDisplay.textContent="Puntos: "+score

el.remove()
clearInterval(fall)

}

if(parseInt(el.style.top)>window.innerHeight){

el.remove()
clearInterval(fall)

}

},20)

}

setInterval(createItem,1000)

</script>

</body>
</html>
